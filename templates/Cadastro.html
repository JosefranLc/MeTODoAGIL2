<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - Portal do Aluno</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
    body { min-height:100vh; background:linear-gradient(135deg, #667eea, #764ba2); display:flex; align-items:center; justify-content:center; padding:20px; }
    .container { background:white; padding:40px 30px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.2); width:100%; max-width:420px; }
    h1 { text-align:center; margin-bottom:30px; color:#333; }
    .form-group { margin-bottom:20px; }
    label { display:block; margin-bottom:8px; color:#555; font-weight:500; }
    input { width:100%; padding:12px 15px; border:1px solid #ddd; border-radius:6px; font-size:16px; }
    input:focus { outline:none; border-color:#667eea; box-shadow:0 0 0 3px rgba(102,126,234,0.2); }
    button { width:100%; padding:14px; background:#667eea; color:white; border:none; border-radius:6px; font-size:16px; cursor:pointer; }
    button:hover { background:#5a67d8; }
    .link { text-align:center; margin-top:20px; }
    .link a { color:#667eea; text-decoration:none; }
    .link a:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Cadastro de Aluno</h1>
    
    <form method="POST">
  <div class="form-group">
    <label>Nome completo</label>
    <input type="text" name="nome" required>
  </div>

  <div class="form-group">
    <label>Matrícula</label>
    <input type="text" name="usuario" required>
  </div>

  <div class="form-group">
    <label>Senha</label>
    <input type="password" name="senha" required>
  </div>

  <button type="submit">Cadastrar</button>
</form>

<div class="link">
  Já tem conta? <a href="{{ url_for('login') }}">Faça login</a>
</div>

</body>
</html>
